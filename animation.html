<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Particle Field</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    canvas { display: block; }
    #info {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.35);
      font: 13px/1 sans-serif;
      letter-spacing: 0.08em;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="info">MOVE YOUR MOUSE &nbsp;·&nbsp; CLICK TO BURST</div>
  <script>
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');

    let W, H, particles, mouse = { x: -9999, y: -9999 };

    /* ── resize ── */
    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', () => { resize(); init(); });
    resize();

    /* ── particle factory ── */
    function makeParticle(x, y, burst) {
      const angle = Math.random() * Math.PI * 2;
      const speed = burst ? 2 + Math.random() * 6 : 0.2 + Math.random() * 0.8;
      const hue   = 200 + Math.random() * 160;   // cyan → violet range
      return {
        x: x ?? Math.random() * W,
        y: y ?? Math.random() * H,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        radius: 1.5 + Math.random() * 2.5,
        hue,
        alpha: 0.6 + Math.random() * 0.4,
        life: 1,
        decay: burst ? 0.008 + Math.random() * 0.012 : 0,
        isBurst: !!burst,
      };
    }

    /* ── init pool ── */
    function init() {
      particles = [];
      const count = Math.floor((W * H) / 6000);
      for (let i = 0; i < count; i++) particles.push(makeParticle());
    }
    init();

    /* ── mouse / click ── */
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('touchmove', e => {
      mouse.x = e.touches[0].clientX;
      mouse.y = e.touches[0].clientY;
    }, { passive: true });
    window.addEventListener('click', e => {
      for (let i = 0; i < 60; i++) particles.push(makeParticle(e.clientX, e.clientY, true));
    });
    window.addEventListener('touchstart', e => {
      for (let i = 0; i < 60; i++)
        particles.push(makeParticle(e.touches[0].clientX, e.touches[0].clientY, true));
    });

    /* ── draw connection lines ── */
    const MAX_DIST = 120;
    function drawLines() {
      for (let i = 0; i < particles.length; i++) {
        const a = particles[i];
        for (let j = i + 1; j < particles.length; j++) {
          const b   = particles[j];
          const dx  = a.x - b.x;
          const dy  = a.y - b.y;
          const d2  = dx * dx + dy * dy;
          if (d2 > MAX_DIST * MAX_DIST) continue;
          const t   = 1 - Math.sqrt(d2) / MAX_DIST;
          ctx.strokeStyle = `hsla(${(a.hue + b.hue) / 2},80%,65%,${t * 0.25})`;
          ctx.lineWidth   = t * 1.5;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }
    }

    /* ── main loop ── */
    function loop() {
      requestAnimationFrame(loop);

      // Soft trail
      ctx.fillStyle = 'rgba(10,10,26,0.18)';
      ctx.fillRect(0, 0, W, H);

      // Update + draw particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];

        // Mouse attraction (only ambient particles)
        if (!p.isBurst) {
          const dx = mouse.x - p.x;
          const dy = mouse.y - p.y;
          const dist = Math.sqrt(dx * dx + dy * dy) || 1;
          const force = Math.min(60 / (dist * dist), 0.8);
          p.vx += dx / dist * force;
          p.vy += dy / dist * force;
        }

        // Dampen velocity
        p.vx *= 0.96;
        p.vy *= 0.96;

        p.x += p.vx;
        p.y += p.vy;

        // Wrap at edges (ambient) or fade out (burst)
        if (p.isBurst) {
          p.life -= p.decay;
          if (p.life <= 0) { particles.splice(i, 1); continue; }
        } else {
          if (p.x < -10) p.x = W + 10;
          if (p.x > W + 10) p.x = -10;
          if (p.y < -10) p.y = H + 10;
          if (p.y > H + 10) p.y = -10;
        }

        const alpha = p.alpha * (p.isBurst ? p.life : 1);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${p.hue},85%,70%,${alpha})`;
        ctx.fill();

        // Glow
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius * 3, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${p.hue},90%,70%,${alpha * 0.08})`;
        ctx.fill();
      }

      drawLines();
    }
    loop();
  </script>
</body>
</html>
